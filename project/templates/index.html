<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZIF Biocomposite Explorer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar left">
      <div class="title">ZIF Biocomposite Explorer</div>

      <div class="logo-card">
        <img
          src="{{ url_for('static', filename='logo.png') }}"
          alt="Logo"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >
        <div class="logo-fallback" style="display:none;">Place static/logo.png here</div>
      </div>

      <div class="card">
        <label for="searchBox">Search sample ID</label>
        <input id="searchBox" type="text" placeholder="e.g. 50_17_WW">
      </div>

      <div class="card">
        <label for="colourBy">Colour by</label>
        <select id="colourBy">
          <option value="phase">Primary phase</option>
          <option value="crystallinity">Relative crystallinity</option>
          <option value="ee">EE%</option>
          <option value="protein_ratio">Protein ratio</option>
          <option value="none">None</option>
        </select>
      </div>

      <div class="card">
        <label for="viewMode">View</label>
        <select id="viewMode">
          <option value="3d">3D stacked</option>
          <option value="2d">2D ternary</option>
        </select>
      </div>

      <div class="card">
        <label for="phaseMulti">Phases</label>
        <select id="phaseMulti" multiple size="7"></select>
      </div>

      <div class="card" id="layerMultiCard">
        <label for="layerMulti">Layers</label>
        <select id="layerMulti" multiple size="6"></select>
      </div>

      <div class="card" id="layerFocusCard">
        <label for="layerFocus">2D layer</label>
        <select id="layerFocus"></select>
      </div>

      <div class="card">
        <label>Wash</label>
        <div class="inline-checks">
          <label class="check-inline">
            <input type="checkbox" id="washEW" checked>
            <span>Ethanol</span>
          </label>
          <label class="check-inline">
            <input type="checkbox" id="washWW" checked>
            <span>Water</span>
          </label>
        </div>
      </div>

      <div class="card">
        <label>Relative crystallinity filter</label>
        <div class="range-readout">
          <span id="crystMinVal">0</span>
          <span id="crystMaxVal">1</span>
        </div>
        <input type="range" id="crystMin" min="0" max="1" step="0.01" value="0">
        <input type="range" id="crystMax" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="card">
        <label>IR / protein ratio filter</label>
        <div class="range-readout">
          <span id="protMinVal">0</span>
          <span id="protMaxVal">1</span>
        </div>
        <input type="range" id="protMin" min="0" max="1" step="0.01" value="0">
        <input type="range" id="protMax" min="0" max="1" step="0.01" value="1">
      </div>

      <div class="card" id="spacingCard">
        <label for="spacingScale">Relative layer spacing</label>
        <input type="range" id="spacingScale" min="0.15" max="3.0" step="0.05" value="0.75">
      </div>
    </aside>

    <!-- MAIN PLOT -->
    <main class="plot-area">
      <div id="plot"></div>
    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar right">
      <div id="sampleTitle" class="sample-title">Click a point</div>

      <div class="card info-grid">
        <div>
          <span>EE%</span>
          <strong id="eeVal">—</strong>
        </div>
        <div>
          <span>Relative crystallinity</span>
          <strong id="crystVal">—</strong>
        </div>
        <div>
          <span>Primary phase</span>
          <strong id="phaseVal">—</strong>
        </div>
        <div>
          <span>Detected phases</span>
          <strong id="detectedVal">—</strong>
        </div>
        <div>
          <span>Protein ratio</span>
          <strong id="proteinVal">—</strong>
        </div>
        <div>
          <span>Wash</span>
          <strong id="washVal">—</strong>
        </div>
        <div>
          <span>Concentration</span>
          <strong id="concVal">—</strong>
        </div>
        <div>
          <span>Signal class</span>
          <strong id="signalVal">—</strong>
        </div>
      </div>

      <div class="card">
        <div class="section-title">ATR-IR spectrum</div>
        <div id="atrPlot" class="mini-plot"></div>
      </div>

      <div class="card">
        <div class="section-title">Repeated experiments</div>
        <div id="experimentCards" class="experiment-grid">
          <div class="empty-msg">Click a point to load repeated experiments.</div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
