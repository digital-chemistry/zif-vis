<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZIF Biocomposite Explorer</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/panels.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/forms.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/plot.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/inspector.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/responsive.css') }}">

  <style>
    .card-divider {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    .accordion-card {
      padding: 0;
      overflow: hidden;
    }

    .accordion-section {
      border-bottom: 1px solid var(--border);
    }

    .accordion-section:last-child {
      border-bottom: none;
    }

    .accordion-section > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .accordion-section > summary::after {
      content: "▾";
      float: right;
      color: var(--muted);
    }

    .accordion-section[open] > summary::after {
      content: "▴";
    }

    .accordion-body {
      padding: 0 14px 14px 14px;
    }

    .icon-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .icon-label i {
      width: 16px;
      height: 16px;
      stroke-width: 2px;
    }

    .plot-area.merged-plot-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      padding: 12px 14px 6px 14px;
    }

    .plot-header-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 4px 10px 4px;
    }

    .plot-header-title {
      font-size: 18px;
      font-weight: 800;
      color: #1f2937;
      letter-spacing: -0.01em;
    }

    .plot-shell {
      position: relative;
      min-height: 720px;
      border-radius: 14px;
      overflow: hidden;
      background: #fcfcfd;
    }

    #plot {
      width: 100%;
      height: 720px;
    }

    .sidebar .panel-card {
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
    }

    .panel-heading {
      font-weight: 800;
      margin-bottom: 12px;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .single-slider-readout {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .seg-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .seg-chip span {
      font-weight: 700;
    }

    .control-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }

    .simple-check-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
    }

    .field span {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .action-row {
      margin-top: 12px;
    }

    .ghost-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
  </style>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="layout">
    {% include "_left_sidebar.html" %}
    {% include "_plot_area.html" %}
    {% include "_right_inspector.html" %}
  </div>

  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
